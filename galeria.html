<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria do Bolão</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="hero">
        <h1>📸 Galeria do Bolão</h1>
        <p>Fotos e momentos da Copa</p>
    </div>

    <div class="menu">
        <button
            class="tab active"
            onclick="window.location.href='index.html'">
            ⬅ Voltar ao Bolão
        </button>
    </div>

    <div class="container">

        <div id="galeria" class="galeria-grid"></div>

    </div>

    <div id="modal" class="modal">

        <button
            id="anterior"
            class="seta">
            ◀
        </button>

        <img id="foto-ampliada">

        <button
            id="proxima"
            class="seta">
            ▶
        </button>

    </div>

    <script>

        let fotos = [];
        let indiceAtual = 0;

        async function carregarGaleria() {

            const resposta =
                await fetch("fotos.json");

            fotos =
                await resposta.json();

            const galeria =
                document.getElementById("galeria");

            fotos.forEach((nomeArquivo, indice) => {

                const img =
                    document.createElement("img");

                img.src =
                    "fotos/" + nomeArquivo;

                img.loading = "lazy";

                img.className =
                    "foto-galeria";

                img.addEventListener(
                    "click",
                    () => abrirFoto(indice)
                );

                galeria.appendChild(img);
            });
        }

        function abrirFoto(indice) {

            indiceAtual = indice;

            document
                .getElementById("foto-ampliada")
                .src =
                "fotos/" + fotos[indiceAtual];

            document
                .getElementById("modal")
                .style.display = "flex";
        }

        function fotoAnterior() {

            indiceAtual--;

            if (indiceAtual < 0) {

                indiceAtual =
                    fotos.length - 1;
            }

            abrirFoto(indiceAtual);
        }

        function fotoProxima() {

            indiceAtual++;

            if (indiceAtual >= fotos.length) {

                indiceAtual = 0;
            }

            abrirFoto(indiceAtual);
        }

        document
            .getElementById("anterior")
            .addEventListener(
                "click",
                (e) => {

                    e.stopPropagation();

                    fotoAnterior();
                }
            );

        document
            .getElementById("proxima")
            .addEventListener(
                "click",
                (e) => {

                    e.stopPropagation();

                    fotoProxima();
                }
            );

        document
            .getElementById("modal")
            .addEventListener(
                "click",
                () => {

                    document
                        .getElementById("modal")
                        .style.display = "none";
                }
            );

        document
            .addEventListener(
                "keydown",
                (e) => {

                    const modal =
                        document.getElementById("modal");

                    if (modal.style.display !== "flex")
                        return;

                    if (e.key === "ArrowLeft") {

                        fotoAnterior();
                    }

                    if (e.key === "ArrowRight") {

                        fotoProxima();
                    }

                    if (e.key === "Escape") {

                        modal.style.display = "none";
                    }
                }
            );

        carregarGaleria();

    </script>

</body>

</html>
