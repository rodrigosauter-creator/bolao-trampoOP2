<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria do Bolão</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="hero">
        <h1>📸 Galeria do Bolão</h1>
        <p>Fotos e momentos da Copa</p>
    </div>

    <div class="menu">
        <button
            class="tab active"
            onclick="window.location.href='index.html'">
            ⬅ Voltar ao Bolão
        </button>
    </div>

    <div class="container">

        <div id="galeria" class="galeria-grid"></div>

    </div>

   <div id="modal" class="modal">

    <button
        id="anterior"
        class="seta">
        ◀
    </button>

    <img id="foto-ampliada">

    <button
        id="proxima"
        class="seta">
        ▶
    </button>

    </div>

    <script>

        async function carregarGaleria() {

            const resposta =
                await fetch("fotos.json");

            const fotos =
                await resposta.json();

            const galeria =
                document.getElementById("galeria");

            fotos.forEach(nomeArquivo => {

                const img =
                    document.createElement("img");

                img.src =
                    "fotos/" + nomeArquivo;

                img.loading = "lazy";

                img.className =
                    "foto-galeria";

                img.addEventListener(
                    "click",
                    () => {

                        document
                            .getElementById(
                                "foto-ampliada"
                            )
                            .src = img.src;

                        document
                            .getElementById(
                                "modal"
                            )
                            .style.display = "flex";
                    }
                );

                galeria.appendChild(img);
            });
        }

        carregarGaleria();

        document
            .getElementById("modal")
            .addEventListener(
                "click",
                () => {

                    document
                        .getElementById(
                            "modal"
                        )
                        .style.display = "none";
                }
            );

    </script>

</body>

</html>
