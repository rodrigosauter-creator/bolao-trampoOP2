<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Fotos</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1 {
            text-align: center;
        }

        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .galeria img {
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .galeria img:hover {
            transform: scale(1.03);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.9);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal img {
            max-width: 95%;
            max-height: 95%;
        }
    </style>
</head>
<body>

<h1>📸 Galeria do Bolão</h1>

<p>
    <a href="index.html">⬅ Voltar ao bolão</a>
</p>

<div id="galeria" class="galeria"></div>

<div id="modal" class="modal">
    <img id="foto-ampliada">
</div>

<script>
async function carregarGaleria() {

    const resposta =
        await fetch("fotos.json");

    const fotos =
        await resposta.json();

    const galeria =
        document.getElementById("galeria");

    fotos.forEach(nomeArquivo => {

        const img =
            document.createElement("img");

        img.src =
            "fotos/" + nomeArquivo;

        img.loading = "lazy";

        img.addEventListener("click", () => {

            document
                .getElementById("foto-ampliada")
                .src = img.src;

            document
                .getElementById("modal")
                .style.display = "flex";
        });

        galeria.appendChild(img);
    });
}

carregarGaleria();

document
.getElementById("modal")
.addEventListener("click", () => {

    document
        .getElementById("modal")
        .style.display = "none";
});
</script>

</body>
</html>
