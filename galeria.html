<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Galeria da Copa</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .galeria img {
            width: 100%;
            cursor: pointer;
            border-radius: 8px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.9);
            justify-content: center;
            align-items: center;
        }

        .modal img {
            max-width: 95%;
            max-height: 95%;
        }
    </style>
</head>

<body>

<h1>📸 Galeria da Copa</h1>

<a href="index.html">⬅ Voltar ao bolão</a>

<div id="galeria" class="galeria"></div>

<div id="modal" class="modal">
    <img id="imagemGrande">
</div>

<script>

fetch("fotos.json")
.then(r => r.json())
.then(lista => {

    const galeria =
        document.getElementById("galeria");

    lista.forEach(foto => {

        const img =
            document.createElement("img");

        img.src = "fotos/" + foto;

        img.onclick = () => {

            document
                .getElementById("imagemGrande")
                .src = img.src;

            document
                .getElementById("modal")
                .style.display = "flex";
        };

        galeria.appendChild(img);
    });

});

document
.getElementById("modal")
.onclick = () => {

    document
    .getElementById("modal")
    .style.display = "none";
};

</script>

</body>
</html>
