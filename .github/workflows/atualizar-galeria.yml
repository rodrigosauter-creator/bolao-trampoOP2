name: Atualizar Galeria

on:
  push:
    paths:
      - 'fotos/**'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gerar fotos.json
        run: |
          python gerar_fotos.py

      - name: Verificar alterações
        id: verificar
        run: |
          git add fotos.json

          if git diff --staged --quiet; then
            echo "alterou=false" >> $GITHUB_OUTPUT
          else
            echo "alterou=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit e Push
        if: steps.verificar.outputs.alterou == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "Atualiza fotos.json"

          git push
