<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bolão Trampo OP2</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <header class="hero">

        <h1>🏆 Bolão Trampo OP2</h1>

        <p>
            Quem será o maior palpiteiro desse grupo? (Só não vale roubar rs)
        </p>

    </header>

    <nav class="menu">

        <button
            class="tab active"
            data-tab="dashboard">

            🏆 Dashboard

        </button>

        <button
            class="tab"
            data-tab="jogos">

            ⚽ Jogos

        </button>

        <button
            class="tab"
            data-tab="apostadores">

            👤 Apostadores

        </button>

        <button
            class="tab"
            onclick="window.location.href='galeria.html'">
            📸 Galeria
        </button>

    </nav>

    <!-- DASHBOARD -->

    <section
        id="dashboard"
        class="pagina ativa">

        <section
            id="podio"
            class="podio">
        </section>

  
        <section class="container">

            <h2>Classificação Geral</h2>

            <table id="ranking">

                <thead>

                    <tr>

                        <th>#</th>

                        <th>Nome</th>

                        <th>Pontos</th>

                        <th>Acertos</th>

                    </tr>

                </thead>

                <tbody>
                </tbody>

            </table>

        </section>

        <section class="container">

            <h2>Evolução da Pontuação</h2>

            <canvas id="grafico"></canvas>

        </section>

    </section>

    <!-- JOGOS -->

    <section
        id="jogos"
        class="pagina">

        <section class="container">

<h2>Resultados dos Jogos</h2>

<select id="filtroJogos" class="filtro-rodada">
    <option value="todos">Todas as fases</option>
    <option value="1">1ª Rodada (1-24)</option>
    <option value="2">2ª Rodada (25-48)</option>
    <option value="3">3ª Rodada (49-72)</option>
    <option value="16">16-Avos (73-88)</option>
    <option value="8">Oitavas (89-96)</option>
    <option value="4">Quartas (97-100)</option>
    <option value="semi">Semifinais (101-102)</option>
    <option value="terceiro">3º Lugar (103)</option>
    <option value="final">Final (104)</option>
</select>

<div id="listaJogos"></div>

        </section>

    </section>

    <!-- APOSTADORES -->

    <section
        id="apostadores"
        class="pagina">

        <section class="container">

            <h2>Apostadores</h2>

            <div
                id="participantesGrid"
                class="grid">
            </div>

        </section>

        <section class="container">

            <div id="detalhesApostador">

                <h2>
                    Selecione um apostador
                </h2>

            </div>

        </section>

    </section>

    <!-- SCRIPT PRINCIPAL -->

    <script src="script.js"></script>

<div class="rodape-imagem">

    <img
        src="imagens/banner-final.png"
        alt="Banner do Bolão">

</div>
    
</body>

</html>
